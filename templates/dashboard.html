<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="container mt-5">

    <h1 class="text-center mb-4">
        Phishing Detection Dashboard
    </h1>

    <div class="row">

        <div class="col-md-4">
            <div class="card text-center p-4 shadow">
                <h3>Total Emails</h3>
                <h1>{{ stats.total }}</h1>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center p-4 shadow">
                <h3>Phishing Emails</h3>
                <h1>{{ stats.phishing }}</h1>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center p-4 shadow">
                <h3>Safe Emails</h3>
                <h1>{{ stats.safe }}</h1>
            </div>
        </div>

    </div>

    <div class="card p-4 shadow mt-5">
        <canvas id="emailChart"></canvas>
    </div>

    <div class="text-center mt-4">
        <a href="/" class="btn btn-primary">
            Analyze New Email
        </a>
    </div>

    <script>
        const ctx = document.getElementById('emailChart');

        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Phishing', 'Safe'],
                datasets: [{
                    data: [
                        {{ stats.phishing }},
                        {{ stats.safe }}
                    ]
                }]
            }
        });
    </script>

</body>
</html>
